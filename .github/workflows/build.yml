name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    defaults:
      run:
        working-directory: electron-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron-app/package-lock.json

      - name: 의존성 설치
        run: npm ci

      - name: 아이콘 생성
        run: node scripts/generate-icons.js

      - name: 빌드 (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: LocalLLM-${{ matrix.name }}
          path: |
            electron-app/dist/*.exe
            electron-app/dist/*.dmg
            electron-app/dist/*.AppImage
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 버전 읽기
        id: version
        run: echo "ver=$(node -p 'require("./electron-app/package.json").version')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 파일 정리
        run: |
          mkdir -p release
          find artifacts -name '*.exe' -exec cp {} release/ \;
          find artifacts -name '*.dmg' -exec cp {} release/ \;
          find artifacts -name '*.AppImage' -exec cp {} release/ \;
          ls -lh release/

      - name: Release 생성/업데이트
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          name: LocalLLM v${{ steps.version.outputs.ver }}
          body: |
            ## 다운로드

            | 플랫폼 | 파일 |
            |--------|------|
            | Windows | `.exe` |
            | macOS | `.dmg` |
            | Linux | `.AppImage` |
          files: release/*
          make_latest: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
