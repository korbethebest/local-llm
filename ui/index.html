<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalLLM</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#09090b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LocalLLM" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090b;
      --s1:       #0f0f12;
      --s2:       #18181b;
      --s3:       #27272a;
      --b1:       #2a2a2f;
      --b2:       #3f3f46;
      --text:     #f4f4f5;
      --dim:      #a1a1aa;
      --muted:    #71717a;
      --accent:   #818cf8;
      --accent2:  #6366f1;
      --acc-bg:   rgba(99,102,241,0.1);
      --danger:   #f87171;
      --green:    #4ade80;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    button, input, textarea, select { font-family: inherit; }
    button { cursor: pointer; }

    /* ═══════════════════════════════════════
       VIEWS
    ═══════════════════════════════════════ */
    .view { display: none; height: 100vh; }
    .view.show { display: flex; }

    /* ═══════════════════════════════════════
       AUTH VIEW
    ═══════════════════════════════════════ */
    #authView {
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 28px;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(99,102,241,0.08) 0%, transparent 70%);
    }

    .auth-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .auth-mark {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #6366f1 0%, #a78bfa 100%);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; color: #fff;
      box-shadow: 0 0 40px rgba(99,102,241,0.35), 0 4px 16px rgba(0,0,0,0.4);
    }

    .auth-name {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .auth-tagline {
      font-size: 13px;
      color: var(--muted);
      margin-top: -4px;
    }

    .auth-card {
      width: 100%;
      max-width: 360px;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 18px;
      padding: 28px 26px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .auth-tabs {
      display: flex;
      background: var(--s3);
      border-radius: 9px;
      padding: 3px;
      gap: 2px;
    }

    .tab {
      flex: 1;
      padding: 7px 0;
      background: none;
      border: none;
      border-radius: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .tab.active {
      background: var(--s2);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    }

    .auth-fields { display: flex; flex-direction: column; gap: 11px; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 12px;
      font-weight: 500;
      color: var(--dim);
      letter-spacing: 0.2px;
    }

    .field input {
      background: var(--s3);
      border: 1px solid var(--b1);
      border-radius: 9px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .field input::placeholder { color: var(--muted); }

    .auth-err {
      font-size: 12.5px;
      color: var(--danger);
      text-align: center;
      min-height: 16px;
    }

    .btn-submit {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none;
      border-radius: 9px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      padding: 11px;
      width: 100%;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }

    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ═══════════════════════════════════════
       APP VIEW
    ═══════════════════════════════════════ */
    #appView { overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 252px;
      flex-shrink: 0;
      background: var(--s1);
      border-right: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .sb-top {
      padding: 16px 12px 12px;
      border-bottom: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sb-brand {
      display: flex; align-items: center; gap: 9px;
      padding: 0 2px;
    }

    .sb-mark {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    .sb-brand-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

    .btn-new {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 12px;
      background: var(--acc-bg);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 9px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-new:hover {
      background: rgba(99,102,241,0.16);
      border-color: rgba(99,102,241,0.4);
    }

    /* Model */
    .sb-model {
      padding: 10px 12px;
      border-bottom: 1px solid var(--b1);
    }

    .sb-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .sb-select {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 8px;
      color: var(--text);
      font-size: 12.5px;
      padding: 6px 9px;
      outline: none;
      transition: border-color 0.12s;
    }

    .sb-select:focus { border-color: var(--accent2); }

    /* History */
    .sb-hist {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px;
    }

    .hist-head {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 4px 6px 6px;
    }

    .hist-item {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .hist-item:hover { background: var(--s2); }
    .hist-item:hover .hist-x { opacity: 1; }
    .hist-item.active { background: var(--s3); }

    .hist-title {
      flex: 1;
      font-size: 12.5px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s;
    }

    .hist-item:hover .hist-title,
    .hist-item.active .hist-title { color: var(--text); }

    .hist-x {
      opacity: 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.1s, opacity 0.15s;
    }

    .hist-x:hover { color: var(--danger); }

    /* User bar */
    .sb-user {
      padding: 10px 12px;
      border-top: 1px solid var(--b1);
      display: flex; align-items: center; gap: 8px;
    }

    .sb-avatar {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #27272a, #3f3f46);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--accent);
      flex-shrink: 0;
      border: 1px solid var(--b1);
    }

    .sb-user-info { flex: 1; min-width: 0; }

    .sb-uname {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .sb-status {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--muted);
    }

    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .dot.on { background: var(--green); }

    .btn-logout {
      background: none; border: none;
      color: var(--muted);
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 7px;
      transition: color 0.12s, background 0.12s;
      flex-shrink: 0;
    }
    .btn-logout:hover { color: var(--text); background: var(--s3); }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .msg-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 32px 16px;
    }

    /* Welcome screen */
    .welcome { display: flex; flex-direction: column; }

    .welcome-greeting {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.6px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .welcome-sub {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 36px;
      font-weight: 300;
    }

    .welcome-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .welcome-card {
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 13px;
      padding: 16px 18px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .welcome-card:hover {
      background: var(--s3);
      border-color: var(--b2);
      transform: translateY(-2px);
    }

    .card-icon {
      font-size: 18px;
      margin-bottom: 2px;
      line-height: 1;
    }

    .card-title {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
    }

    .card-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    /* Messages */
    .msg {
      padding: 22px 0;
      border-bottom: 1px solid #111114;
      animation: fadein 0.2s ease;
    }
    .msg:last-child { border-bottom: none; }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-head {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 11px;
    }

    .msg-av {
      width: 26px; height: 26px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }

    .msg-av.user {
      background: var(--s3);
      border: 1px solid var(--b2);
      color: var(--accent);
    }

    .msg-av.assistant {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
    }

    .msg-role {
      font-size: 11.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
    }

    .msg-actions {
      padding-left: 35px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .msg:hover .msg-actions { opacity: 1; }

    .btn-copy-msg {
      background: none;
      border: 1px solid var(--b2);
      border-radius: 6px;
      color: var(--text);
      font-size: 11.5px;
      padding: 4px 10px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-copy-msg:hover { background: var(--s3); border-color: var(--accent2); }

    .msg-body { padding-left: 35px; }

    .user-bubble {
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 11px;
      padding: 11px 15px;
      font-size: 14.5px;
      line-height: 1.7;
      white-space: pre-wrap;
      color: var(--text);
    }

    /* Markdown */
    .asst-body {
      font-size: 14.5px;
      line-height: 1.8;
      color: var(--text);
    }
    .asst-body p { margin-bottom: 12px; }
    .asst-body p:last-child { margin-bottom: 0; }
    .asst-body h1 { font-size: 20px; font-weight: 600; margin: 20px 0 8px; letter-spacing: -0.3px; }
    .asst-body h2 { font-size: 16px; font-weight: 600; margin: 16px 0 6px; }
    .asst-body h3 { font-size: 14.5px; font-weight: 600; margin: 12px 0 4px; }
    .asst-body ul, .asst-body ol { padding-left: 22px; margin-bottom: 12px; }
    .asst-body li { margin-bottom: 5px; }
    .asst-body li:last-child { margin-bottom: 0; }
    .asst-body strong { font-weight: 600; color: var(--text); }
    .asst-body em { font-style: italic; color: var(--dim); }
    .asst-body a { color: var(--accent); text-decoration: none; }
    .asst-body a:hover { text-decoration: underline; }
    .asst-body blockquote {
      border-left: 2px solid var(--b2);
      padding-left: 14px;
      color: var(--dim);
      margin: 10px 0;
      font-style: italic;
    }
    .asst-body code {
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12.5px;
      background: var(--s3);
      border: 1px solid var(--b1);
      border-radius: 5px;
      padding: 1px 6px;
      color: #c4b5fd;
    }
    .asst-body pre {
      margin: 12px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--b1);
    }
    .asst-body pre code {
      display: block;
      padding: 14px 16px;
      overflow-x: auto;
      font-size: 12.5px;
      background: #13151a;
      border: none;
      border-radius: 0;
      color: #e6edf3;
      line-height: 1.65;
    }
    .code-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px;
      background: #1a1d24;
      border-bottom: 1px solid #252930;
    }
    .code-lang { font-size: 11px; color: var(--muted); font-family: monospace; letter-spacing: 0.3px; }
    .btn-copy {
      background: none; border: none;
      color: var(--muted); font-size: 11.5px; font-family: inherit;
      padding: 2px 8px; border-radius: 5px;
      transition: color 0.1s, background 0.1s;
    }
    .btn-copy:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .asst-body table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
    .asst-body th, .asst-body td {
      border: 1px solid var(--b1); padding: 8px 12px; text-align: left;
    }
    .asst-body th { background: var(--s3); font-weight: 600; }
    .asst-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    /* Thinking animation */
    .thinking {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 13px; padding: 4px 0;
    }
    .dots { display: flex; gap: 4px; }
    .dots span {
      width: 5px; height: 5px;
      background: var(--muted); border-radius: 50%;
      animation: pulse 1.4s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.55); opacity: 0.3; }
      40%           { transform: scale(1);    opacity: 1; }
    }

    /* ── Input ── */
    .input-area {
      padding: 10px 32px 22px;
      max-width: 784px;
      width: 100%;
      margin: 0 auto;
    }

    .input-box {
      background: var(--s2);
      border: 1px solid var(--b2);
      border-radius: 14px;
      padding: 13px 14px 13px 18px;
      display: flex; align-items: flex-end; gap: 10px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-box:focus-within {
      border-color: rgba(99,102,241,0.55);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }

    #userInput {
      flex: 1;
      background: none; border: none; outline: none; resize: none;
      color: var(--text);
      font-size: 14.5px;
      line-height: 1.55;
      min-height: 24px;
      max-height: 200px;
      overflow-y: auto;
    }
    #userInput::placeholder { color: var(--muted); }

    .btn-send {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(99,102,241,0.35);
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .btn-send:hover:not(:disabled) { opacity: 0.9; transform: scale(1.06); }
    .btn-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
    }

    /* Settings panel */
    .sb-settings {
      padding: 10px 12px;
      border-bottom: 1px solid var(--b1);
    }

    .sb-settings summary {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--muted);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sb-settings summary::before { content: '▸'; transition: transform 0.15s; }
    .sb-settings[open] summary::before { transform: rotate(90deg); }

    .sb-settings .settings-body { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }

    .sb-settings label {
      font-size: 11px;
      color: var(--dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sb-settings input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      margin-top: 2px;
    }

    .sb-settings textarea {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      padding: 6px 9px;
      outline: none;
      resize: vertical;
      min-height: 48px;
      max-height: 120px;
      font-family: inherit;
    }

    .sb-settings textarea:focus { border-color: var(--accent2); }

    /* History inline rename */
    .hist-title-input {
      background: var(--s3);
      border: 1px solid var(--accent2);
      border-radius: 4px;
      color: var(--text);
      font-size: 12.5px;
      padding: 1px 4px;
      outline: none;
      width: 100%;
      font-family: inherit;
    }

    /* Export button */
    .hist-export {
      opacity: 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.1s, opacity 0.15s;
    }

    .hist-item:hover .hist-export { opacity: 1; }
    .hist-export:hover { color: var(--accent); }

    /* Mobile hamburger */
    .btn-hamburger {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      width: 36px; height: 36px;
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 9px;
      align-items: center;
      justify-content: center;
      color: var(--text);
      cursor: pointer;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 49;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        z-index: 50;
        height: 100vh;
        transition: left 0.25s ease;
      }

      .sidebar.open { left: 0; }
      .sidebar.open ~ .sidebar-overlay { display: block; }

      .btn-hamburger { display: flex; }

      .main { width: 100%; }

      .msg-inner { padding: 40px 16px 16px; }
      .input-area { padding: 10px 16px 16px; }

      .welcome-grid { grid-template-columns: 1fr; }
    }

    /* Download modal */
    .dl-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .dl-overlay.show { display: flex; }

    .dl-panel {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 16px;
      width: 90%;
      max-width: 480px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .dl-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .dl-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .dl-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border: 1px solid var(--b1);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: border-color 0.12s;
    }

    .dl-item:hover { border-color: var(--b2); }

    .dl-item-info { display: flex; align-items: center; gap: 12px; }

    .dl-item-icon {
      width: 36px;
      height: 36px;
      background: var(--s3);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .dl-item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .dl-item-size {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .dl-btn {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 16px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .dl-btn:hover { opacity: 0.9; }

    .dl-version {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 14px;
    }

    /* Admin panel */
    .admin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .admin-overlay.show { display: flex; }

    .admin-panel {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 16px;
      width: 95%;
      max-width: 900px;
      height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--b1);
      flex-shrink: 0;
    }

    .admin-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .admin-nav {
      display: flex;
      gap: 2px;
      background: var(--s3);
      border-radius: 8px;
      padding: 3px;
    }

    .admin-nav button {
      padding: 6px 14px;
      background: none;
      border: none;
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }

    .admin-nav button.active {
      background: var(--s2);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .admin-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .admin-close:hover { color: var(--text); background: var(--s3); }

    .admin-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px 24px;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .admin-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 8px 10px;
      border-bottom: 1px solid var(--b1);
      position: sticky;
      top: 0;
      background: var(--s1);
    }

    .admin-table td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--dim);
    }

    .admin-table tr:hover td { background: var(--s2); }

    .badge-admin {
      background: rgba(99,102,241,0.15);
      color: var(--accent);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }

    .badge-user {
      background: var(--s3);
      color: var(--muted);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }

    .admin-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .admin-btn {
      background: none;
      border: 1px solid var(--b1);
      border-radius: 6px;
      color: var(--dim);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;

    .admin-btn:hover { color: var(--text); border-color: var(--b2); background: var(--s3); }
    .admin-btn.danger:hover { color: var(--danger); border-color: var(--danger); }
    .admin-btn.primary { border-color: var(--accent2); color: var(--accent); }
    .admin-btn.primary:hover { background: rgba(99,102,241,0.1); }

    /* Conversation viewer */
    .conv-viewer-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--accent);

      cursor: pointer;
      padding: 0;
      margin-bottom: 16px;

    .conv-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border: 1px solid var(--b1);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: background 0.1s;
      cursor: pointer;
    }

    .conv-list-item:hover { background: var(--s2); }

    .conv-list-title {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 12px;
    }

    .conv-list-meta {
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .conv-viewer-msg {
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);

    .conv-viewer-msg:last-child { border-bottom: none; }

    .conv-viewer-role {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .conv-viewer-role.user { color: var(--accent); }

    .conv-viewer-content {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--dim);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--b2); }
  </style>
</head>
<body>

<!-- ═══════════════════════════════
     AUTH VIEW
═══════════════════════════════ -->
<div id="authView" class="view show">
  <div class="auth-brand">
    <div class="auth-mark">L</div>
    <div class="auth-name">LocalLLM</div>
    <div class="auth-tagline">프라이빗 로컬 AI 어시스턴트</div>
  </div>

  <div class="auth-card">
    <div class="auth-tabs">
      <button class="tab active" onclick="setTab('login')">로그인</button>

    <form class="auth-fields" onsubmit="submitAuth(event)">

      </div>
      <div class="field">
        <label>이메일</label>
        <input type="email" id="authEmail" placeholder="example@email.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="authPw" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <div class="auth-err" id="authErr"></div>
      <button type="submit" class="btn-submit" id="authBtn">로그인</button>

  </div>
</div>

<!-- ═══════════════════════════════
     APP VIEW
═══════════════════════════════ -->
<div id="appView" class="view">
  <button class="btn-hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">
        <div class="sb-mark">L</div>
        <div class="sb-brand-text">LocalLLM</div>
      </div>
      <button class="btn-new" onclick="newChat()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        새 대화
      </button>
      <button class="btn-new" onclick="openDownloads()" style="background:none;border:1px solid var(--b1);color:var(--dim)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        데스크탑 앱 다운로드
      </button>
    </div>

    <div class="sb-model">
      <div class="sb-label">모델</div>
      <select class="sb-select" id="modelSel" onchange="curModel=this.value">
        <option value="">로딩 중...</option>
      </select>
    </div>

    <details class="sb-settings">
      <summary>설정</summary>
      <div class="settings-body">
        <div>
          <label>Temperature <span id="tempVal">0.7</span></label>
          <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0.7"
            oninput="curTemp=parseFloat(this.value);document.getElementById('tempVal').textContent=this.value">
        </div>
        <div>
          <label>시스템 프롬프트</label>
          <textarea id="sysPrompt" placeholder="AI의 역할이나 규칙을 입력하세요..."
            oninput="curSysPrompt=this.value"></textarea>
        </div>
      </div>
    </details>

    <div class="sb-hist" id="histList">
      <div class="hist-head">대화 기록</div>
    </div>

    <div class="sb-user">
      <div class="sb-avatar" id="userAv">?</div>
      <div class="sb-user-info">
        <div class="sb-uname" id="userNameEl">—</div>
        <div class="sb-status">
          <div class="dot" id="statusDot"></div>
          <span id="statusTxt">연결 중...</span>
        </div>
      </div>
      <button class="btn-logout" id="adminBtn" onclick="openAdmin()" title="관리자" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 15c-3.87 0-7 1.57-7 3.5V21h14v-2.5c0-1.93-3.13-3.5-7-3.5z"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <button class="btn-logout" onclick="logout()" title="로그아웃">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="messages" id="messages">
      <div class="msg-inner" id="msgInner"></div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="userInput" rows="1" placeholder="메시지를 입력하세요..."
          onkeydown="onKey(event)" oninput="onInput(this)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="send()" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter 전송 &nbsp;·&nbsp; Shift+Enter 줄바꿈</div>
    </div>
  </main>
</div>

<!-- Download Modal -->
<div class="dl-overlay" id="dlOverlay" onclick="if(event.target===this)closeDl()">
  <div class="dl-panel">
    <div class="dl-header">
      <h2>데스크탑 앱 다운로드</h2>
      <button class="admin-close" onclick="closeDl()">×</button>
    </div>
    <div id="dlContent"><div style="color:var(--muted);text-align:center;padding:20px">불러오는 중...</div></div>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-overlay" id="adminOverlay" onclick="if(event.target===this)closeAdmin()">
  <div class="admin-panel">
    <div class="admin-header">
      <h2 id="adminTitle">사용자 관리</h2>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="admin-nav" id="adminNav">
          <button class="active" onclick="adminTab('users')">사용자</button>
          <button onclick="adminTab('convs')">대화 내역</button>
        </div>
        <button class="admin-close" onclick="closeAdmin()">×</button>
      </div>
    </div>
    <div class="admin-content" id="adminContent"></div>
  </div>
</div>

<script>
/* ── State ── */
let token = localStorage.getItem('lq_token') || '';
let username = '';
let curModel = '';
let curConvId = null;
let localMsgs = [];
let streaming = false;
let authMode = 'login';
let convList = [];
let curTemp = 0.7;
let curSysPrompt = '';
let isAdmin = false;

/* ── Marked ── */
const mdRenderer = new marked.Renderer();
mdRenderer.code = (code, lang) => {
  const hl = (lang && hljs.getLanguage(lang))
    ? hljs.highlight(code, { language: lang }).value
    : hljs.highlightAuto(code).value;
  const raw = code.replace(/`/g, '&#96;').replace(/\\/g, '\\\\');
  return `<div class="code-bar"><span class="code-lang">${lang || 'text'}</span><button class="btn-copy" onclick="copyCode(this,\`${raw}\`)">복사</button></div><pre><code class="hljs">${hl}</code></pre>`;
};
marked.use({ renderer: mdRenderer, breaks: true, gfm: true });

/* ── Bootstrap ── */
async function init() {
  if (token) {
    try {
      const me = await api('GET', '/auth/me');
      username = me.username;
      isAdmin = me.is_admin;
      await enterApp();
    } catch {
      token = '';
      localStorage.removeItem('lq_token');
    }
  }
}

/* ── Auth tab ── */
function setTab(mode) {
  authMode = mode;
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', (i === 0) === (mode === 'login'))
  );
  document.getElementById('nameField').style.display = mode === 'register' ? '' : 'none';
  document.getElementById('authBtn').textContent = mode === 'login' ? '로그인' : '회원가입';
  document.getElementById('authPw').autocomplete = mode === 'login' ? 'current-password' : 'new-password';
  document.getElementById('authErr').textContent = '';
}

async function submitAuth(e) {
  e.preventDefault();
  const btn = document.getElementById('authBtn');
  const errEl = document.getElementById('authErr');
  btn.disabled = true;
  errEl.textContent = '';
  try {
    const email = document.getElementById('authEmail').value.trim();
    const pw    = document.getElementById('authPw').value;
    let data;
    if (authMode === 'login') {
      data = await api('POST', '/auth/login', { email, password: pw }, false);
    } else {
      const name = document.getElementById('authName').value.trim() || email.split('@')[0];
      data = await api('POST', '/auth/register', { email, username: name, password: pw }, false);
    }
    token = data.access_token;
    username = data.username;
    localStorage.setItem('lq_token', token);
    const me = await api('GET', '/auth/me');
    isAdmin = me.is_admin;
    await enterApp();
  } catch (err) {
    errEl.textContent = err.message || '오류가 발생했습니다.';
  } finally {
    btn.disabled = false;
  }
}

function logout() {
  token = ''; username = ''; curConvId = null; localMsgs = []; convList = [];
  localStorage.removeItem('lq_token');
  document.getElementById('authView').classList.add('show');
  document.getElementById('appView').classList.remove('show');
  document.getElementById('authEmail').focus();
}

/* ── App entry ── */
async function enterApp() {
  document.getElementById('authView').classList.remove('show');
  document.getElementById('appView').classList.add('show');
  document.getElementById('userNameEl').textContent = username;
  document.getElementById('userAv').textContent = username.charAt(0).toUpperCase();
  document.getElementById('adminBtn').style.display = isAdmin ? '' : 'none';
  await Promise.all([loadModels(), loadConvList()]);
  showWelcome();
  document.getElementById('userInput').focus();
}

/* ── API ── */
async function api(method, path, body, auth = true) {
  const h = { 'Content-Type': 'application/json' };
  if (auth && token) h['Authorization'] = `Bearer ${token}`;
  const r = await fetch(path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
  const d = await r.json().catch(() => ({}));
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    if (typeof d.detail === 'string') msg = d.detail;
    else if (Array.isArray(d.detail)) msg = d.detail.map(e => e.msg).join(', ');
    throw new Error(msg);
  }
  return d;
}

/* ── Models ── */
async function loadModels() {
  try {
    const { models } = await api('GET', '/ollama/tags');
    const sel = document.getElementById('modelSel');
    if (!models?.length) { sel.innerHTML = '<option value="">모델 없음</option>'; setStatus(false, '모델 없음'); return; }
    sel.innerHTML = models.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
    curModel = models[0].name;
    setStatus(true, `연결됨 · ${models.length}개`);
  } catch {
    document.getElementById('modelSel').innerHTML = '<option value="">연결 실패</option>';
    setStatus(false, 'Ollama 오프라인');
  }
}

function setStatus(ok, txt) {
  document.getElementById('statusDot').className = 'dot' + (ok ? ' on' : '');
  document.getElementById('statusTxt').textContent = txt;
}

/* ── Conversations ── */
async function loadConvList() {
  try { convList = await api('GET', '/conversations'); renderHist(); } catch {}
}

async function loadConv(id) {
  if (curConvId === id) return;
  try {
    const data = await api('GET', `/conversations/${id}`);
    curConvId = id;
    localMsgs = data.messages;
    if (data.model) {
      const opt = document.getElementById('modelSel').querySelector(`option[value="${data.model}"]`);
      if (opt) { document.getElementById('modelSel').value = data.model; curModel = data.model; }
    }
    renderHist();
    renderMsgs();
  } catch {}
}

async function delConv(id, e) {
  e.stopPropagation();
  try {
    await api('DELETE', `/conversations/${id}`);
    convList = convList.filter(c => c.id !== id);
    if (curConvId === id) { curConvId = null; localMsgs = []; showWelcome(); }
    renderHist();
  } catch {}
}

function renderHist() {
  const el = document.getElementById('histList');
  if (!convList.length) {
    el.innerHTML = '<div class="hist-head">대화 기록</div><div style="font-size:12px;color:var(--muted);padding:4px 8px">기록 없음</div>';
    return;
  }
  el.innerHTML = '<div class="hist-head">대화 기록</div>' + convList.map(c => `
    <div class="hist-item${c.id === curConvId ? ' active' : ''}" onclick="loadConv(${c.id})">
      <span class="hist-title" ondblclick="startRename(${c.id},event)">${esc(c.title)}</span>
      <button class="hist-export" onclick="exportConv(${c.id},event)" title="내보내기">↓</button>
      <button class="hist-x" onclick="delConv(${c.id},event)">×</button>
    </div>`).join('');
}

async function startRename(id, e) {
  e.stopPropagation();
  const span = e.target;
  const conv = convList.find(c => c.id === id);
  if (!conv) return;
  const input = document.createElement('input');
  input.className = 'hist-title-input';
  input.value = conv.title;
  span.replaceWith(input);
  input.focus();
  input.select();
  const finish = async () => {
    const newTitle = input.value.trim();
    if (newTitle && newTitle !== conv.title) {
      try {
        await api('PATCH', `/conversations/${id}`, { title: newTitle });
        conv.title = newTitle;
      } catch {}
    }
    renderHist();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = conv.title; input.blur(); } });
}

async function exportConv(id, e) {
  e.stopPropagation();
  try {
    const data = await api('GET', `/conversations/${id}/export`);
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${data.title.replace(/[^a-zA-Z0-9가-힣 ]/g, '')}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch {}
}

  { icon: '📋', title: '요약', hint: '긴 글을\n핵심만 정리해줘', prompt: '다음 내용을 요약해줘:\n\n' },
  { icon: '🔍', title: '디버깅', hint: '코드 버그를 찾고\n수정 방법 제안해줘', prompt: '이 코드의 버그를 찾아서 수정해줘:\n\n```\n\n```' },

function showWelcome() {

function useCard(idx) {

/* ── Render messages ── */
function renderMsgs() {
  document.getElementById('msgInner').innerHTML = localMsgs.map((m, i) => buildMsgHtml(m, i)).join('');
  scrollDown();
}

function buildMsgHtml(m, idx) {
  const isUser = m.role === 'user';
  const av = isUser ? username.charAt(0).toUpperCase() : 'L';
  const roleLabel = isUser ? '나' : '어시스턴트';
  const body = isUser
    ? `<div class="msg-body"><div class="user-bubble">${esc(m.content)}</div></div>`
    : `<div class="msg-body asst-body">${marked.parse(m.content)}</div>`;
  const actions = !isUser ? `<div class="msg-actions"><button class="btn-copy-msg" onclick="copyMsg(${idx})"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>복사</button></div>` : '';
  return `
    <div class="msg">
      <div class="msg-head">
        <div class="msg-av ${m.role}">${esc(av)}</div>
        <div class="msg-role">${roleLabel}</div>
      </div>
      ${body}
      ${actions}
    </div>`;
}

function appendMsg(role, content, isStreaming = false) {
  const inner = document.getElementById('msgInner');
  // Clear welcome if present
  if (inner.querySelector('.welcome')) inner.innerHTML = '';

  const div = document.createElement('div');
  div.className = 'msg';
  const av = role === 'user' ? username.charAt(0).toUpperCase() : 'L';
  const roleLabel = role === 'user' ? '나' : '어시스턴트';

  let body;
  if (isStreaming) {
    body = `<div class="msg-body asst-body"><div class="thinking"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
  } else if (role === 'user') {
    body = `<div class="msg-body"><div class="user-bubble">${esc(content)}</div></div>`;
  } else {
    body = `<div class="msg-body asst-body">${marked.parse(content)}</div>`;
  }

  const actions = role === 'assistant' ? `<div class="msg-actions"><button class="btn-copy-msg" onclick="copyMsgFromEl(this)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>복사</button></div>` : '';
  div.innerHTML = `
    <div class="msg-head">
      <div class="msg-av ${role}">${esc(av)}</div>
      <div class="msg-role">${roleLabel}</div>
    </div>
    ${body}
    ${actions}`;
  inner.appendChild(div);
  scrollDown();
  return div;
}

function updateStreaming(el, content) {
  el.querySelector('.msg-body').className = 'msg-body asst-body';
  el.querySelector('.msg-body').innerHTML = marked.parse(content);
  scrollDown();
}

/* ── Send ── */
async function send() {
  const ta = document.getElementById('userInput');
  const text = ta.value.trim();
  if (!text || streaming || !curModel) return;

  ta.value = '';
  onInput(ta);

  localMsgs.push({ role: 'user', content: text });
  appendMsg('user', text);

  const asstEl = appendMsg('assistant', '', true);

  streaming = true;
  document.getElementById('sendBtn').disabled = true;

  let acc = '';

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ conversation_id: curConvId, content: text, model: curModel, temperature: curTemp, system_prompt: curSysPrompt }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        try {
          const d = JSON.parse(line);
          if (d.conversation_id && !curConvId) curConvId = d.conversation_id;
          if (d.token) { acc += d.token; updateStreaming(asstEl, acc); }
          if (d.error) throw new Error(d.error);
          if (d.done) await loadConvList();
        } catch {}
      }
    }
  } catch (err) {
    acc = `오류가 발생했습니다: ${err.message}`;
    updateStreaming(asstEl, acc);
  }

  localMsgs.push({ role: 'assistant', content: acc });
  streaming = false;
  document.getElementById('sendBtn').disabled = false;
  ta.focus();
}

function newChat() { curConvId = null; localMsgs = []; renderHist(); showWelcome(); document.getElementById('userInput').focus(); }

/* ── Input helpers ── */
function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!document.getElementById('sendBtn').disabled) send();
  }
}

function onInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim() || streaming;
}

/* ── Utils ── */
function scrollDown() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyMsg(idx) {
  const m = localMsgs[idx];
  if (!m) return;
  navigator.clipboard.writeText(m.content).then(() => {
    const btns = document.querySelectorAll('.btn-copy-msg');
    const btn = btns[Math.floor(idx / 2)]; // assistant messages only have buttons
    if (btn) { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>복사됨!'; setTimeout(() => { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>복사'; }, 1800); }
  });
}

function copyMsgFromEl(btn) {
  const msg = btn.closest('.msg');
  const body = msg.querySelector('.msg-body');
  navigator.clipboard.writeText(body.innerText).then(() => {
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>복사됨!';
    setTimeout(() => { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>복사'; }, 1800);
  });
}

/* ── Downloads ── */
async function openDownloads() {
  document.getElementById('dlOverlay').classList.add('show');
  const el = document.getElementById('dlContent');
  try {
    const res = await fetch('https://api.github.com/repos/korbethebest/local-llm/releases/latest');
    if (!res.ok) throw new Error('릴리즈를 찾을 수 없습니다.');
    const release = await res.json();
    const platforms = [
      { name: 'Windows', icon: '🪟', ext: '.exe' },
      { name: 'macOS', icon: '🍎', ext: '.dmg' },
      { name: 'Linux', icon: '🐧', ext: '.AppImage' },
    ];
    const items = platforms.map(p => {
      const asset = release.assets.find(a => a.name.endsWith(p.ext));
      if (!asset) return `<div class="dl-item"><div class="dl-item-info"><div class="dl-item-icon">${p.icon}</div><div><div class="dl-item-name">${p.name}</div><div class="dl-item-size">빌드 없음</div></div></div></div>`;
      const size = (asset.size / 1024 / 1024).toFixed(1) + ' MB';
      return `<div class="dl-item"><div class="dl-item-info"><div class="dl-item-icon">${p.icon}</div><div><div class="dl-item-name">${p.name}</div><div class="dl-item-size">${asset.name} · ${size}</div></div></div><a class="dl-btn" href="${asset.browser_download_url}" target="_blank">다운로드</a></div>`;
    }).join('');
    el.innerHTML = items + `<div class="dl-version">${esc(release.name)} · ${new Date(release.published_at).toLocaleDateString('ko')}</div>`;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--muted);text-align:center;padding:20px">${e.message}<br><a href="https://github.com/korbethebest/local-llm/releases" target="_blank" style="color:var(--accent);font-size:13px">GitHub Releases에서 직접 확인</a></div>`;
  }
}

function closeDl() { document.getElementById('dlOverlay').classList.remove('show'); }

/* ── Admin ── */
let adminUsers = [];
let adminCurrentTab = 'users';

async function openAdmin() {
  document.getElementById('adminOverlay').classList.add('show');
  adminTab('users');
}

function closeAdmin() { document.getElementById('adminOverlay').classList.remove('show'); }

function adminTab(tab) {
  adminCurrentTab = tab;
  document.querySelectorAll('#adminNav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('#adminNav button').forEach(b => { if ((tab === 'users' && b.textContent === '사용자') || (tab === 'convs' && b.textContent === '대화 내역')) b.classList.add('active'); });
  if (tab === 'users') loadAdminUsers();
  else if (tab === 'convs') loadAdminConvUsers();
}

async function loadAdminUsers() {
  const el = document.getElementById('adminContent');
  try {
    adminUsers = await api('GET', '/admin/users');
    el.innerHTML = `<table class="admin-table">
      <thead><tr><th>이름</th><th>이메일</th><th>역할</th><th>대화</th><th>가입일</th><th></th></tr></thead>
      <tbody>${adminUsers.map(u => `
        <tr>
          <td style="color:var(--text);font-weight:500">${esc(u.username)}</td>
          <td>${esc(u.email)}</td>
          <td><span class="${u.is_admin ? 'badge-admin' : 'badge-user'}">${u.is_admin ? '관리자' : '사용자'}</span></td>
          <td>${u.conversation_count}</td>
          <td>${new Date(u.created_at).toLocaleDateString('ko')}</td>
          <td class="admin-actions">
            <button class="admin-btn" onclick="toggleAdminRole(${u.id},${!u.is_admin})">${u.is_admin ? '권한 해제' : '관리자 지정'}</button>
            <button class="admin-btn danger" onclick="deleteUser(${u.id},'${esc(u.username)}')">삭제</button>
          </td>
        </tr>`).join('')}</tbody></table>`;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);text-align:center;padding:40px">${e.message}</div>`;
  }
}

async function loadAdminConvUsers() {
  const el = document.getElementById('adminContent');
  try {
    if (!adminUsers.length) adminUsers = await api('GET', '/admin/users');
    el.innerHTML = adminUsers.map(u => `
      <div class="conv-list-item" onclick="loadAdminUserConvs(${u.id})">
        <span class="conv-list-title">${esc(u.username)} <span style="color:var(--muted);font-weight:400">(${esc(u.email)})</span></span>
        <span class="conv-list-meta">${u.conversation_count}개 대화</span>
      </div>`).join('') || '<div style="color:var(--muted);text-align:center;padding:40px">사용자가 없습니다.</div>';
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);text-align:center;padding:40px">${e.message}</div>`;
  }
}

async function loadAdminUserConvs(uid) {
  const el = document.getElementById('adminContent');
  try {
    const data = await api('GET', `/admin/users/${uid}/conversations`);
    el.innerHTML = `
      <button class="conv-viewer-back" onclick="loadAdminConvUsers()">← 사용자 목록</button>
      <h3 style="color:var(--text);font-size:15px;margin-bottom:14px">${esc(data.username)}님의 대화 (${data.conversations.length}개)</h3>
      ${data.conversations.length ? data.conversations.map(c => `
        <div class="conv-list-item" onclick="loadAdminConvDetail(${c.id})">
          <span class="conv-list-title">${esc(c.title)}</span>
          <span class="conv-list-meta">${c.message_count}개 메시지 · ${c.model} · ${new Date(c.updated_at).toLocaleDateString('ko')}</span>
        </div>`).join('') : '<div style="color:var(--muted);padding:20px;text-align:center">대화 기록 없음</div>'}`;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);text-align:center;padding:40px">${e.message}</div>`;
  }
}

async function loadAdminConvDetail(convId) {
  const el = document.getElementById('adminContent');
  try {
    const data = await api('GET', `/admin/conversations/${convId}`);
    el.innerHTML = `
      <button class="conv-viewer-back" onclick="history.state?.uid ? loadAdminUserConvs(history.state.uid) : loadAdminConvUsers()">← 뒤로</button>
      <h3 style="color:var(--text);font-size:15px;margin-bottom:4px">${esc(data.title)}</h3>
      <div style="color:var(--muted);font-size:12px;margin-bottom:16px">${esc(data.username)} · ${esc(data.model)} · ${data.messages.length}개 메시지</div>
      ${data.messages.map(m => `
        <div class="conv-viewer-msg">
          <div class="conv-viewer-role ${m.role}">${m.role === 'user' ? '사용자' : '어시스턴트'}</div>
          <div class="conv-viewer-content">${m.role === 'assistant' ? marked.parse(m.content) : esc(m.content)}</div>
        </div>`).join('')}`;
  } catch (e) {
    el.innerHTML = `<div style="color:var(--danger);text-align:center;padding:40px">${e.message}</div>`;
  }
}

async function toggleAdminRole(uid, makeAdmin) {
  try { await api('PATCH', `/admin/users/${uid}`, { is_admin: makeAdmin }); loadAdminUsers(); } catch (e) { alert(e.message); }
}

async function deleteUser(uid, name) {
  if (!confirm(`"${name}" 사용자를 삭제하시겠습니까?\n모든 대화 내역도 함께 삭제됩니다.`)) return;
  try { await api('DELETE', `/admin/users/${uid}`); adminUsers = []; loadAdminUsers(); } catch (e) { alert(e.message); }
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('open');
}

function copyCode(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '복사됨!';
    setTimeout(() => btn.textContent = '복사', 1800);
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

init();
